<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="M'IAM Île-aux-Moines">
<meta name="theme-color" content="#1a3a2a">
<title>M'IAM — Île-aux-Moines</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --sea: #2a6b8a;
  --sea-light: #4a9bb5;
  --forest: #1a3a2a;
  --forest-mid: #2d5e3f;
  --forest-light: #4a8c5f;
  --sand: #e8d5a3;
  --sand-light: #f5edd8;
  --cream: #faf6ed;
  --text: #1c2b22;
  --text-muted: #5a7060;
  --card-bg: rgba(250,246,237,0.97);
  --radius: 16px;
  --shadow: 0 8px 32px rgba(26,58,42,0.18);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "DM Sans", sans-serif; background: var(--forest); color: var(--text); height: 100dvh; overflow: hidden; }

/* === MAP === */
#map { position: absolute; inset: 0; z-index: 1; }
.leaflet-tile-pane { filter: saturate(1.1) brightness(0.97); }

/* === HEADER === */
#header {
  position: absolute; top: 0; left: 0; right: 0; z-index: 10;
  padding: 12px 16px 10px;
  background: linear-gradient(to bottom, rgba(26,58,42,0.92) 70%, transparent);
  pointer-events: none;
}
#header h1 {
  font-family: "Playfair Display", serif;
  font-size: 22px; font-weight: 600;
  color: var(--sand-light);
  letter-spacing: 0.02em;
  line-height: 1.1;
}
#header p { font-size: 11px; color: rgba(232,213,163,0.7); margin-top: 2px; letter-spacing: 0.08em; text-transform: uppercase; }

/* === GPS BADGE === */
#gps-badge {
  position: absolute; top: 16px; right: 16px; z-index: 11;
  background: var(--forest-mid); color: var(--sand-light);
  border-radius: 20px; padding: 6px 12px;
  font-size: 11px; font-weight: 500; letter-spacing: 0.05em;
  display: flex; align-items: center; gap: 6px;
  cursor: pointer; border: 1px solid rgba(232,213,163,0.25);
  transition: background 0.2s;
}
#gps-badge:hover { background: var(--forest-light); }
#gps-dot { width: 8px; height: 8px; border-radius: 50%; background: #aaa; transition: background 0.3s; }
#gps-dot.active { background: #4fc87a; box-shadow: 0 0 6px #4fc87a; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

/* === FILTER BAR === */
#filter-bar {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
  padding: 8px 0 max(8px, env(safe-area-inset-bottom));
  background: linear-gradient(to top, rgba(26,58,42,0.95) 60%, transparent);
  overflow: hidden;
}
#filter-scroll {
  display: flex; gap: 8px; padding: 4px 14px;
  overflow-x: auto; scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
#filter-scroll::-webkit-scrollbar { display: none; }
.filter-btn {
  flex-shrink: 0; white-space: nowrap;
  padding: 7px 14px; border-radius: 20px;
  background: rgba(255,255,255,0.1); color: var(--sand-light);
  border: 1px solid rgba(232,213,163,0.2);
  font-family: "DM Sans", sans-serif; font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; gap: 5px;
}
.filter-btn:hover, .filter-btn.active {
  background: var(--sand); color: var(--forest);
  border-color: var(--sand);
}
.filter-btn .count { font-size: 10px; opacity: 0.7; }

/* === LOCATE BTN === */
#locate-btn {
  position: absolute; bottom: 80px; right: 14px; z-index: 10;
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--cream); color: var(--forest);
  border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 3px 12px rgba(0,0,0,0.3); font-size: 18px;
  transition: transform 0.15s;
}
#locate-btn:hover { transform: scale(1.08); }

/* === ALERT POPUP === */
#alert-popup {
  position: absolute; top: 70px; left: 50%; transform: translateX(-50%);
  z-index: 20; background: var(--sea); color: white;
  border-radius: 24px; padding: 10px 20px;
  font-size: 13px; font-weight: 500; text-align: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  animation: slideDown 0.3s ease;
  max-width: 85vw;
  display: none;
}
@keyframes slideDown { from{opacity:0;top:50px} to{opacity:1;top:70px} }

/* === POI PANEL === */
#poi-panel {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 30;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.34, 1.2, 0.64, 1);
  max-height: 88dvh;
  background: var(--cream);
  border-radius: 24px 24px 0 0;
  overflow: hidden;
  box-shadow: 0 -8px 40px rgba(0,0,0,0.3);
}
#poi-panel.open { transform: translateY(0); }
#panel-handle { width: 36px; height: 4px; background: rgba(26,58,42,0.2); border-radius: 2px; margin: 12px auto 0; }
#panel-inner { overflow-y: auto; max-height: calc(88dvh - 20px); padding-bottom: env(safe-area-inset-bottom); }
#panel-close {
  position: absolute; top: 10px; right: 14px;
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(26,58,42,0.1); border: none; cursor: pointer;
  font-size: 16px; display: flex; align-items: center; justify-content: center;
  color: var(--forest); z-index: 2;
}
#poi-image-wrap {
  display: none;
  background: var(--forest);
  width: 100%;
}
#poi-image-wrap.visible { display: block; }
/* Contrer .leaflet-container img { max-width: none !important } */
#poi-panel #poi-image {
  display: block !important;
  max-width: 100% !important;
  width: auto !important;
  height: auto !important;
  max-height: 320px !important;
  margin: 0 auto !important;
  position: static !important;
  left: auto !important;
  top: auto !important;
}
#poi-image-placeholder {
  width: 100%; height: 100px;
  background: linear-gradient(135deg, var(--forest-mid), var(--sea));
  display: flex; align-items: center; justify-content: center;
  font-size: 48px;
}
#poi-image-placeholder.hidden { display: none; }
.poi-content { padding: 16px 18px 20px; }
.poi-cat-badge {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--forest); color: var(--sand-light);
  border-radius: 12px; padding: 4px 10px; font-size: 11px; font-weight: 500;
  margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.06em;
}
#poi-name {
  font-family: "Playfair Display", serif;
  font-size: 24px; font-weight: 600; color: var(--forest);
  line-height: 1.2; margin-bottom: 10px;
}
#poi-desc {
  font-size: 14px; line-height: 1.65; color: var(--text-muted);
  white-space: pre-line;
  margin-bottom: 14px;
}
.poi-links { display: flex; flex-direction: column; gap: 8px; }
.poi-link {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px; border-radius: 12px;
  background: var(--forest); color: var(--sand-light);
  text-decoration: none; font-size: 13px; font-weight: 500;
  transition: background 0.2s;
}
.poi-link:hover { background: var(--forest-light); }
.poi-dist-badge {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(74,140,95,0.15); color: var(--forest-mid);
  border-radius: 10px; padding: 4px 10px; font-size: 12px;
  margin-bottom: 12px;
}

/* === Custom markers === */
.poi-marker {
  width: 24px; height: 24px; border-radius: 50% 50% 50% 3px;
  transform: rotate(-45deg);
  border: 2px solid white;
  box-shadow: 0 2px 6px rgba(0,0,0,0.45);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: transform 0.18s;
  position: relative;
}
.poi-marker:hover { transform: rotate(-45deg) scale(1.25) !important; }
.poi-marker span { transform: rotate(45deg); font-size: 10px; line-height: 1; }
.poi-marker.active-marker { transform: rotate(-45deg) scale(1.3) !important; box-shadow: 0 0 0 2.5px var(--sand), 0 4px 12px rgba(0,0,0,0.5); }

/* === Hover tooltip === */
.poi-tooltip {
  position: fixed;
  background: var(--forest); color: var(--sand-light);
  border-radius: 10px; padding: 0;
  font-family: "DM Sans", sans-serif;
  pointer-events: none; z-index: 9999;
  box-shadow: 0 4px 16px rgba(0,0,0,0.35);
  opacity: 0; transition: opacity 0.15s;
  overflow: hidden;
  width: 160px;
  transform: translateX(-50%);
}
.poi-tooltip.visible { opacity: 1; }
.poi-tooltip-img {
  width: 100%; height: 90px; object-fit: cover;
  display: block;
}
.poi-tooltip-img.hidden { display: none; }
.poi-tooltip-placeholder {
  width: 100%; height: 60px;
  background: linear-gradient(135deg, var(--forest-mid), var(--sea));
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
}
.poi-tooltip-placeholder.hidden { display: none; }
.poi-tooltip-label {
  padding: 6px 10px 7px;
  font-size: 12px; font-weight: 500;
  color: var(--sand-light);
  line-height: 1.3;
  white-space: normal;
  max-width: 200px;
}

/* === User location === */
.user-dot { width: 16px; height: 16px; border-radius: 50%; background: #4fc87a; border: 3px solid white; box-shadow: 0 0 8px rgba(79,200,122,0.6); }

/* === Leaflet overrides === */
.leaflet-control-zoom { display: none; }
.leaflet-popup { display: none; }
</style>
</head>
<body>
<div id="map"></div>

<div id="header">
  <h1>M'IAM</h1>
  <p>Île-aux-Moines · Morbihan</p>
</div>

<div id="gps-badge" onclick="toggleGPS()">
  <div id="gps-dot"></div>
  <span id="gps-label">GPS off</span>
</div>

<button id="locate-btn" onclick="centerOnUser()" title="Me localiser">📍</button>

<div id="alert-popup"></div>

<div id="filter-bar">
  <div id="filter-scroll"></div>
</div>

<div id="poi-panel">
  <div id="panel-handle" ondblclick="window._debugImage && window._debugImage()"></div>
  <button id="panel-close" onclick="closePanel()">✕</button>
  <div id="panel-inner">
    <div id="poi-image-wrap">
      <img id="poi-image" src="" alt="" onerror="document.getElementById('poi-image-wrap').classList.remove('visible'); document.getElementById('poi-image-placeholder').classList.remove('hidden')">
    </div>
    <div id="poi-image-placeholder"><span id="poi-placeholder-emoji">📍</span></div>
    <div class="poi-content">
      <div class="poi-cat-badge" id="poi-cat"></div>
      <div id="poi-name"></div>
      <div class="poi-dist-badge" id="poi-dist" style="display:none">📍 <span id="poi-dist-val"></span></div>
      <div id="poi-desc"></div>
      <div class="poi-links" id="poi-links"></div>
    </div>
  </div>
</div>

  "Restaurant": "#c0392b",
  "Restauration rapide": "#e67e22",
  "Bar": "#8e44ad",
  "Plage": "#2980b9",
  "Location vélo": "#8B4513",

let map, userMarker, userLat, userLon;
let gpsActive = false, watchId = null;
let activeFilter = "Tous";
let markers = [];
let alertedPois = new Set();
let activeMarkerEl = null;

// Init map
map = L.map("map", {zoomControl: false, attributionControl: false})
  .setView([47.5985, -2.848], 15);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19,
  attribution: "© OpenStreetMap"
}).addTo(map);

// Attribution discrète
L.control.attribution({prefix: false, position: "bottomleft"}).addTo(map);

// Tooltip hover global (un seul dans le DOM, déplacé sur chaque marker)
const tooltipEl = document.createElement("div");
tooltipEl.className = "poi-tooltip";
tooltipEl.innerHTML = `
  <img class="poi-tooltip-img hidden" id="tt-img" alt="">
  <div class="poi-tooltip-placeholder" id="tt-placeholder"><span id="tt-emoji"></span></div>
  <div class="poi-tooltip-label" id="tt-label"></div>`;
document.body.appendChild(tooltipEl);

let tooltipTimeout;

function showTooltip(markerEl, poi) {
  clearTimeout(tooltipTimeout);
  const img = tooltipEl.querySelector("#tt-img");
  const ph = tooltipEl.querySelector("#tt-placeholder");
  const emoji = tooltipEl.querySelector("#tt-emoji");
  tooltipEl.querySelector("#tt-label").textContent = poi.name;
  emoji.textContent = poi.emoji;

  if (poi.image) {
    img.src = poi.image;
    img.classList.remove("hidden");
    ph.classList.add("hidden");
    img.onerror = () => { img.classList.add("hidden"); ph.classList.remove("hidden"); };
  } else {
    img.classList.add("hidden");
    ph.classList.remove("hidden");
  }

  // Positionner via coordonnées écran (évite toute rotation héritée du marqueur)
  const rect = markerEl.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const top = rect.top - 8;
  tooltipEl.style.left = cx + "px";
  tooltipEl.style.top = "auto";
  tooltipEl.style.bottom = (window.innerHeight - top) + "px";

  // S'assurer que le tooltip est dans le body (pas dans le marqueur)
  if (tooltipEl.parentNode !== document.body) {
    document.body.appendChild(tooltipEl);
  }
  tooltipEl.classList.add("visible");
}

function hideTooltip() {
  tooltipTimeout = setTimeout(() => {
    tooltipEl.classList.remove("visible");
  }, 120);
}

// Create markers
function createMarker(poi) {
  const color = CAT_COLORS[poi.cat] || "#2d5e3f";
  const icon = L.divIcon({
    className: "",
    html: `<div class="poi-marker" style="background:${color}"><span>${poi.emoji}</span></div>`,
    iconSize: [24, 24],
    iconAnchor: [12, 24],
    popupAnchor: [0, -24]
  });
  const m = L.marker([poi.lat, poi.lon], {icon}).addTo(map);

  m.on("click", () => openPOI(poi, m));
  m._poi = poi;

  // Hover : afficher tooltip avec étiquette + photo
  m.on("mouseover", () => {
    const el = m.getElement()?.querySelector(".poi-marker");
    if (el) showTooltip(el, poi);
  });
  m.on("mouseout", hideTooltip);

  // Touch long-press pour mobile (300ms)
  let pressTimer;
  m.on("touchstart", () => {
    pressTimer = setTimeout(() => {
      const el = m.getElement()?.querySelector(".poi-marker");
      if (el) showTooltip(el, poi);
    }, 300);
  });
  m.on("touchend", () => { clearTimeout(pressTimer); hideTooltip(); });

  return m;
}

markers = POIS.map(createMarker);

// Filter bar
const cats = ["Tous", ...new Set(POIS.map(p => p.cat))];
const filterScroll = document.getElementById("filter-scroll");
cats.forEach(cat => {
  const count = cat === "Tous" ? POIS.length : POIS.filter(p => p.cat === cat).length;
  const emoji = cat === "Tous" ? "🗺️" : (POIS.find(p => p.cat === cat)?.emoji || "");
  const btn = document.createElement("button");
  btn.className = "filter-btn" + (cat === "Tous" ? " active" : "");
  btn.innerHTML = `${emoji} ${cat} <span class="count">${count}</span>`;
  btn.onclick = () => setFilter(cat, btn);
  filterScroll.appendChild(btn);
});

function setFilter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  markers.forEach(m => {
    if (cat === "Tous" || m._poi.cat === cat) {
      m.addTo(map);
    } else {
      map.removeLayer(m);
    }
  });
}

// Open POI panel
function openPOI(poi, marker) {
  // Reset active marker
  if (activeMarkerEl) activeMarkerEl.classList.remove("active-marker");
  const el = marker?.getElement()?.querySelector(".poi-marker");
  if (el) { el.classList.add("active-marker"); activeMarkerEl = el; }

  const panel = document.getElementById("poi-panel");
  const img = document.getElementById("poi-image");
  const placeholder = document.getElementById("poi-image-placeholder");
  const placeholderEmoji = document.getElementById("poi-placeholder-emoji");

  document.getElementById("poi-name").textContent = poi.name;
  document.getElementById("poi-cat").textContent = poi.emoji + " " + poi.cat;
  document.getElementById("poi-desc").textContent = poi.description || "";

  // Image
  if (poi.image) {
    img.src = poi.image;
    document.getElementById("poi-image-wrap").classList.add("visible");
    placeholder.classList.add("hidden");
  } else {
    img.src = "";
    document.getElementById("poi-image-wrap").classList.remove("visible");
    placeholder.classList.remove("hidden");
    placeholderEmoji.textContent = poi.emoji;
  }

  // Distance
  const distEl = document.getElementById("poi-dist");
  if (userLat && userLon) {
    const d = haversine(userLat, userLon, poi.lat, poi.lon);
    document.getElementById("poi-dist-val").textContent = d < 1000 ? Math.round(d) + " m" : (d/1000).toFixed(1) + " km";
    distEl.style.display = "inline-flex";
  } else {
    distEl.style.display = "none";
  }

  // Links
  const linksEl = document.getElementById("poi-links");
  linksEl.innerHTML = "";
  if (poi.links && poi.links.length) {
    poi.links.forEach(([url, label]) => {
      const a = document.createElement("a");
      a.href = url; a.target = "_blank"; a.className = "poi-link";
      a.innerHTML = `🔗 ${label.length > 40 ? label.slice(0,40)+"…" : label}`;
      linksEl.appendChild(a);
    });
  }

  panel.classList.add("open");
  map.panTo([poi.lat, poi.lon], {animate: true, duration: 0.4});
}

function closePanel() {
  document.getElementById("poi-panel").classList.remove("open");
  if (activeMarkerEl) { activeMarkerEl.classList.remove("active-marker"); activeMarkerEl = null; }
}

// Close panel on map click
map.on("click", closePanel);

// GPS
function toggleGPS() {
  if (gpsActive) {
    stopGPS();
  } else {
    startGPS();
  }
}

function startGPS() {
  if (!navigator.geolocation) {
    showAlert("GPS non disponible sur cet appareil");
    return;
  }
  watchId = navigator.geolocation.watchPosition(onPosition, onGPSError, {
    enableHighAccuracy: true, maximumAge: 3000, timeout: 10000
  });
  gpsActive = true;
  document.getElementById("gps-dot").classList.add("active");
  document.getElementById("gps-label").textContent = "GPS on";
}

function stopGPS() {
  if (watchId) navigator.geolocation.clearWatch(watchId);
  gpsActive = false;
  document.getElementById("gps-dot").classList.remove("active");
  document.getElementById("gps-label").textContent = "GPS off";
}

function onPosition(pos) {
  userLat = pos.coords.latitude;
  userLon = pos.coords.longitude;
  
  // User dot
  const userIcon = L.divIcon({className:"", html:`<div class="user-dot"></div>`, iconSize:[16,16], iconAnchor:[8,8]});
  if (userMarker) {
    userMarker.setLatLng([userLat, userLon]);
  } else {
    userMarker = L.marker([userLat, userLon], {icon: userIcon, zIndexOffset: 1000}).addTo(map);
  }
  
  // Check proximity 50m
  checkProximity();
}

function onGPSError(err) {
  showAlert("Impossible d'obtenir la position GPS");
}

function centerOnUser() {
  if (userLat && userLon) {
    map.flyTo([userLat, userLon], 17, {duration: 1.2});
  } else {
    startGPS();
    showAlert("Activation du GPS…");
  }
}

function checkProximity() {
  if (!userLat || !userLon) return;
  const visiblePois = activeFilter === "Tous" ? POIS : POIS.filter(p => p.cat === activeFilter);
  visiblePois.forEach(poi => {
    const d = haversine(userLat, userLon, poi.lat, poi.lon);
    if (d <= 50 && !alertedPois.has(poi.name)) {
      alertedPois.add(poi.name);
      showAlert(`${poi.emoji} À ${Math.round(d)} m : ${poi.name}`);
      // Vibration si dispo
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    }
    // Reset si on s'éloigne > 100m
    if (d > 100) alertedPois.delete(poi.name);
  });
}

let alertTimeout;
function showAlert(msg) {
  const el = document.getElementById("alert-popup");
  el.textContent = msg;
  el.style.display = "block";
  clearTimeout(alertTimeout);
  alertTimeout = setTimeout(() => { el.style.display = "none"; }, 4000);
}

// Haversine distance (metres)
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// DEBUG - afficher les styles calculés de l'image
window._debugImage = function() {
  const img = document.getElementById('poi-image');
  const wrap = document.getElementById('poi-image-wrap');
  const cs = window.getComputedStyle(img);
  const csw = window.getComputedStyle(wrap);
  const info = [
    'IMG computed styles:',
    'display: ' + cs.display,
    'max-width: ' + cs.maxWidth,
    'width: ' + cs.width,
    'height: ' + cs.height,
    'margin: ' + cs.margin,
    'position: ' + cs.position,
    'naturalWidth: ' + img.naturalWidth,
    'naturalHeight: ' + img.naturalHeight,
    'offsetWidth: ' + img.offsetWidth,
    'offsetHeight: ' + img.offsetHeight,
    '---',
    'WRAP computed styles:',
    'display: ' + csw.display,
    'width: ' + csw.width,
    'offsetWidth: ' + wrap.offsetWidth,
  ].join('\n');
  alert(info);
};

// Service Worker for offline
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}
